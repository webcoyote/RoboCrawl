<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoboCrawl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; cursor: crosshair; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      line-height: 1.6;
    }
    #stats {
      position: fixed;
      top: 16px;
      right: 16px;
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      line-height: 1.6;
      text-align: right;
    }
    #overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4466;
      font-family: monospace;
      font-size: 48px;
      text-align: center;
      text-shadow: 0 0 12px rgba(0,0,0,0.9);
      display: none;
      pointer-events: none;
    }
    #damageFlash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(ellipse at center,
        rgba(255, 0, 0, 0) 35%,
        rgba(255, 0, 0, 0.55) 95%);
      transition: opacity 0.18s ease-out;
    }
    #cheatMenu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 16px;
      background: rgba(8, 12, 20, 0.92);
      border: 1px solid rgba(120, 180, 220, 0.5);
      padding: 18px 22px;
      min-width: 280px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.8);
      display: none;
    }
    #cheatMenu h2 {
      font-size: 18px;
      margin-bottom: 12px;
      letter-spacing: 0.1em;
      color: #aad8ff;
    }
    #cheatMenu ol {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #cheatMenu li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    #cheatMenu li:hover { background: rgba(80, 140, 200, 0.18); }
    #cheatMenu li.selected { background: rgba(80, 140, 200, 0.35); }
    #cheatMenu .key {
      display: inline-block;
      width: 22px;
      text-align: center;
      color: #88aacc;
    }
    #cheatMenu .label { flex: 1; }
    #cheatMenu .swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      margin-left: 10px;
    }
    #cheatMenu .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #889;
      text-align: center;
    }
    #pauseTitle {
      position: fixed;
      top: 8vh;
      left: 50%;
      transform: translateX(-50%);
      color: #aad8ff;
      font-family: monospace;
      font-size: 88px;
      font-weight: bold;
      letter-spacing: 0.18em;
      text-shadow: 0 0 14px rgba(80, 160, 220, 0.6),
                   0 0 32px rgba(80, 160, 220, 0.35);
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>WASD / Arrows to move</div>
    <div>MOUSE to aim &middot; CLICK / HOLD to shoot</div>
    <div>E to throw grenade</div>
    <div>ESC to pause/resume</div>
  </div>
  <div id="stats">
    <div id="hp">HP: 25</div>
    <div id="score">Score: 0</div>
    <div id="wave">Distance: 0m</div>
    <div id="power" style="display:none; font-weight:bold;"></div>
    <div id="shield" style="display:none; font-weight:bold;"></div>
  </div>
  <div id="damageFlash"></div>
  <div id="pauseTitle">RoboCrawl</div>
  <div id="overlay"></div>
  <div id="cheatMenu">
    <h2>CHEAT MENU</h2>
    <ol id="cheatList"></ol>
    <div class="hint">Press number key, click row, or 0 to clear · ESC to resume</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
